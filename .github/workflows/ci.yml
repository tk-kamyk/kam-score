name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '22'

jobs:
  api-build-test:
    name: API Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results
          path: api/tests/**/TestResults/*.trx

  spa-build-test:
    name: SPA Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spa

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: spa/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx vue-tsc --noEmit

      - name: Build
        run: npm run build-only

  deploy:
    name: Deploy
    needs: [api-build-test, spa-build-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: spa/package-lock.json

      # Build and deploy API
      - name: Publish API
        run: dotnet publish api/src/KamSquare.KamScore.Api/KamSquare.KamScore.Api.csproj -c Release -o ./api-publish

      - name: Deploy API to Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: .
          dockerfilePath: api/Dockerfile
          acrName: ${{ vars.ACR_NAME }}
          containerAppName: ${{ vars.API_CONTAINER_APP_NAME }}
          resourceGroup: ${{ vars.RESOURCE_GROUP }}

      # Build and deploy SPA
      - name: Install SPA dependencies
        run: npm ci
        working-directory: spa

      - name: Build SPA
        run: npm run build-only
        working-directory: spa
        env:
          VITE_API_BASE_URL: ${{ vars.API_BASE_URL }}

      - name: Deploy SPA to Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: spa/dist
          skip_app_build: true
