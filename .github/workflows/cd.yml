name: CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '22'

jobs:
  api-build-test:
    name: API Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: api-test-results
          path: api/tests/**/TestResults/*.trx

  spa-build-test:
    name: SPA Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spa

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: spa/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx vue-tsc --noEmit

      - name: Build
        run: npm run build-only

  deploy:
    name: Deploy (App Service + Static Web App)
    needs: [api-build-test, spa-build-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v5

      - name: Azure Login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy infrastructure
        id: infra
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ vars.RESOURCE_GROUP }}
          deploymentName: kam-score-${{ github.sha }}
          template: infra/main.bicep

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish API
        run: dotnet publish api/src/KamSquare.KamScore.Api/KamSquare.KamScore.Api.csproj -c Release -o ./api-publish

      - name: Zip API publish output
        run: cd api-publish && zip -r ../api-publish.zip .

      - name: Deploy API to App Service
        run: >
          az webapp deploy
          --resource-group ${{ vars.RESOURCE_GROUP }}
          --name kam-score-api
          --src-path api-publish.zip
          --type zip

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: spa/package-lock.json

      - name: Install SPA dependencies
        working-directory: spa
        run: npm ci

      - name: Build SPA for Static Web App
        working-directory: spa
        env:
          # client.ts uses VITE_API_BASE_URL as the FULL base (host + /api prefix).
          # Bicep's apiUrl output is the host only, so append /api here.
          VITE_API_BASE_URL: ${{ steps.infra.outputs.apiUrl }}/api
        run: npm run build-only

      - name: Deploy SPA to Static Web App
        run: |
          set -euo pipefail
          TOKEN=$(az staticwebapp secrets list \
            --name kam-score-spa \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --query 'properties.apiKey' -o tsv)
          if [ -z "$TOKEN" ]; then
            echo "ERROR: Failed to retrieve SWA deployment token" >&2
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          npx --yes @azure/static-web-apps-cli@latest deploy ./spa/dist \
            --deployment-token "$TOKEN" \
            --env production \
            --no-use-keychain

  deploy-container:
    name: Deploy (Container Apps — secondary)
    needs: [api-build-test, spa-build-test, deploy]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v5

      - name: Azure Login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get ACR login server
        id: acr
        run: echo "loginServer=$(az acr show --name ${{ vars.ACR_NAME }} --query loginServer -o tsv)" >> $GITHUB_OUTPUT

      - name: Login to ACR
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Build and push API image
        run: |
          docker build -t ${{ steps.acr.outputs.loginServer }}/kam-score-api:${{ github.sha }} -f api/Dockerfile api/
          docker push ${{ steps.acr.outputs.loginServer }}/kam-score-api:${{ github.sha }}

      - name: Build and push SPA image
        run: |
          docker build -t ${{ steps.acr.outputs.loginServer }}/kam-score-spa:${{ github.sha }} -f spa/Dockerfile spa/
          docker push ${{ steps.acr.outputs.loginServer }}/kam-score-spa:${{ github.sha }}

      - name: Deploy container infrastructure
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ vars.RESOURCE_GROUP }}
          deploymentName: kam-score-container-${{ github.sha }}
          template: infra/main-container.bicep
          parameters: >
            apiImage=${{ steps.acr.outputs.loginServer }}/kam-score-api:${{ github.sha }}
            spaImage=${{ steps.acr.outputs.loginServer }}/kam-score-spa:${{ github.sha }}
