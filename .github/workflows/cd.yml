name: CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '22'

jobs:
  api-build-test:
    name: API Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results
          path: api/tests/**/TestResults/*.trx

  spa-build-test:
    name: SPA Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spa

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: spa/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx vue-tsc --noEmit

      - name: Build
        run: npm run build-only

  deploy:
    name: Deploy
    needs: [api-build-test, spa-build-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get ACR login server
        id: acr
        run: echo "loginServer=$(az acr show --name ${{ vars.ACR_NAME }} --query loginServer -o tsv)" >> $GITHUB_OUTPUT

      - name: Login to ACR
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Build and push API image
        run: |
          docker build -t ${{ steps.acr.outputs.loginServer }}/REDACTED-API:${{ github.sha }} -f api/Dockerfile api/
          docker push ${{ steps.acr.outputs.loginServer }}/REDACTED-API:${{ github.sha }}

      - name: Build and push SPA image
        run: |
          docker build -t ${{ steps.acr.outputs.loginServer }}/REDACTED-SPA:${{ github.sha }} -f spa/Dockerfile spa/
          docker push ${{ steps.acr.outputs.loginServer }}/REDACTED-SPA:${{ github.sha }}

      - name: Deploy infrastructure
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ vars.RESOURCE_GROUP }}
          template: infra/main.bicep
          parameters: >
            apiImage=${{ steps.acr.outputs.loginServer }}/REDACTED-API:${{ github.sha }}
            spaImage=${{ steps.acr.outputs.loginServer }}/REDACTED-SPA:${{ github.sha }}
