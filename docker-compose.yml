services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - CosmosDb__ConnectionString=${COSMOSDB_CONNECTION_STRING}
      - Jwt__Secret=${JWT_SECRET}
      - Users=${USERS}
      - Cors__AllowedOrigins__0=http://localhost:3000

  spa:
    build:
      context: ./spa
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - API_BACKEND_URL=http://api:8080
    depends_on:
      - api
